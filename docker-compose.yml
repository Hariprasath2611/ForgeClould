version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - forgecloud-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - forgecloud-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - forgecloud-net
    depends_on:
      - auth-service
      - project-service
      - dashboard

  auth-service:
    build: 
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
      args:
        SERVICE_NAME: auth-service
    networks:
      - forgecloud-net
    environment:
      - MONGO_URI=mongodb://mongodb:27017/forgecloud
      - REDIS_URL=redis://redis:6379

  project-service:
    build: 
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
      args:
        SERVICE_NAME: project-service
    networks:
      - forgecloud-net
    environment:
      - MONGO_URI=mongodb://mongodb:27017/forgecloud
      - REDIS_URL=redis://redis:6379

  dashboard:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
      args:
        APP_NAME: dashboard
    networks:
      - forgecloud-net


volumes:
  mongo_data:

networks:
  forgecloud-net:
